{% extends "base.html" %}
{% block title %} — Transfer{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card p-4">
      <h5 class="mb-3">Transfer Funds</h5>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">From Account</label>
          <select name="from_account" class="form-select" required>
            {% for acct in my_accounts %}
            <option value="{{ acct.id }}">Account #{{ acct.id }} (${{ "%.2f"|format(acct.balance) }})</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">To Account</label>
          <select name="to_account" class="form-select" required>
            {% for acct in all_accounts %}
            <option value="{{ acct.id }}">Account #{{ acct.id }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Amount ($)</label>
          <input type="number" name="amount" class="form-control" min="0.01" step="0.01" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Transfer</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
